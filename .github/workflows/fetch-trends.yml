name: Fetch Trends

on:
  schedule:
    # 毎日 0:00, 6:00, 12:00, 18:00 (JST) に実行
    # GitHub Actions の cron は UTC 基準のため -9h
    - cron: "0 15,21,3,9 * * *"
  workflow_dispatch:
    # 手動実行も可能（テスト用）

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # リポジトリへのコミット権限

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: トレンドデータを取得・保存
        run: node scripts/fetch-trends.js

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 変更がある場合のみコミット
          git diff --cached --quiet || git commit -m "chore: update trends $(date +'%Y-%m-%d %H:%M JST')"
          git push
