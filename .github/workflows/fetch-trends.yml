name: Fetch Trends

on:
  schedule:
    # 毎日 0:00, 6:00, 12:00, 18:00 (JST) に実行
    # GitHub Actions の cron は UTC 基準のため -9h
    - cron: "0 15,21,3,9 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      # setup-node を削除 → ubuntu-latest に最初から入っている Node.js を使う
      # （Node.js ダウンロードによる 2〜3分のロスを解消）
      - name: Node.js バージョン確認
        run: node --version

      - name: トレンドデータを取得・保存
        run: node scripts/fetch-trends.js
        timeout-minutes: 3
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update trends $(date +'%Y-%m-%d %H:%M JST')"
          git push
