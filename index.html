<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレンドランキング | 今日の話題</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5f4f2;
    --bg2:       #ffffff;
    --bg3:       #eceae6;
    --border:    rgba(0,0,0,0.10);
    --gold:      #a07828;
    --gold-lt:   #8a6820;
    --text:      #3a3830;
    --text-muted:#888078;
    --rank1:     #a07828;
    --rank2:     #6a7888;
    --rank3:     #8a5c2e;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans JP',sans-serif;
    font-weight:400;
    font-size:20px;
    line-height:1.7;
    min-height:100vh;
  }

  /* ─── ヘッダー ─── */
  header{
    border-bottom:1px solid var(--border);
    padding:0 24px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    height:72px;
    position:sticky;top:0;z-index:100;
    background:rgba(245,244,242,0.95);
    backdrop-filter:blur(12px);
  }
  .logo{
    font-family:'DM Serif Display',serif;
    font-size:22px;
    color:var(--gold-lt);
    letter-spacing:0.02em;
    grid-column:2;
    text-align:center;
    font-size:28px;
  }
  .logo span{
    font-family:'Noto Sans JP',sans-serif;
    font-size:11px;
    font-weight:300;
    color:var(--text-muted);
    display:block;
    letter-spacing:0.12em;
    margin-top:-4px;
  }
  .refresh-badge{
    font-size:11px;
    color:var(--text-muted);
    display:flex;align-items:center;gap:6px;
  }
  .refresh-dot{
    width:6px;height:6px;border-radius:50%;
    background:#3ecf8e;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  /* ─── メインレイアウト ─── */
  main{max-width:1000px;margin:0 auto;padding:32px 24px 80px;}

  .section-title{
    font-family:'DM Serif Display',serif;
    font-size:28px;
    color:var(--gold-lt);
    margin-bottom:4px;
  }
  .section-subtitle{
    font-size:12px;
    color:var(--text-muted);
    letter-spacing:0.1em;
    margin-bottom:24px;
  }

  /* ─── 日付タブ ─── */
  .date-tabs{
    display:flex;gap:8px;flex-wrap:wrap;
    margin-bottom:24px;
  }
  .date-tab{
    padding:7px 16px;
    border-radius:4px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text-muted);
    font-family:'Noto Sans JP',sans-serif;
    font-size:15px;
    cursor:pointer;
    transition:all 0.18s;
    white-space:nowrap;
  }
  .date-tab:hover{ border-color:rgba(201,168,76,0.4); color:var(--gold); }
  .date-tab.active{
    background:var(--gold);
    border-color:var(--gold);
    color:#0b0d11;
    font-weight:700;
  }

  /* ─── カテゴリフィルター ─── */
  .category-bar{
    display:flex;gap:6px;flex-wrap:wrap;
    margin-bottom:20px;
    padding-bottom:20px;
    border-bottom:1px solid var(--border);
  }
  .cat-btn{
    padding:6px 16px;
    border-radius:20px;
    border:1px solid var(--border);
    background:transparent;
    font-family:'Noto Sans JP',sans-serif;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:all 0.15s;
    white-space:nowrap;
    color:var(--text-muted);
  }
  .cat-btn:hover{ border-color:rgba(255,255,255,0.2); color:var(--text); }
  .cat-btn.active{
    color:#0b0d11;
    font-weight:700;
    border-color:transparent;
  }
  /* カテゴリ別カラー */
  .cat-btn[data-cat="トレンド"].active        { background:#8a8880; }
  .cat-btn[data-cat="テクノロジー"].active   { background:#4285f4; }
  .cat-btn[data-cat="経済・投資"].active     { background:#3ecf8e; }
  .cat-btn[data-cat="エンタメ"].active       { background:#a855f7; }
  .cat-btn[data-cat="ライフスタイル"].active  { background:#f97316; }
  .cat-btn[data-cat="スポーツ"].active       { background:#ef4444; }
  .cat-btn[data-cat="グルメ"].active         { background:#eab308; }
  .cat-btn[data-cat="社会・ニュース"].active  { background:#64748b; }

  /* カテゴリバッジ（アイテム内） */
  .cat-badge{
    font-size:10px;
    font-weight:700;
    padding:2px 8px;
    border-radius:20px;
    letter-spacing:0.04em;
    flex-shrink:0;
  }
  .cat-テクノロジー  { background:rgba(66,133,244,0.18);  color:#7ab3ff; border:1px solid rgba(66,133,244,0.35); }
  .cat-経済投資      { background:rgba(62,207,142,0.18);  color:#4ee0a0; border:1px solid rgba(62,207,142,0.35); }
  .cat-エンタメ      { background:rgba(168,85,247,0.18);  color:#c084fc; border:1px solid rgba(168,85,247,0.35); }
  .cat-ライフスタイル{ background:rgba(249,115,22,0.18);  color:#fb923c; border:1px solid rgba(249,115,22,0.35); }
  .cat-スポーツ      { background:rgba(239,68,68,0.18);   color:#f87171; border:1px solid rgba(239,68,68,0.35); }
  .cat-グルメ        { background:rgba(234,179,8,0.18);   color:#fbbf24; border:1px solid rgba(234,179,8,0.35); }
  .cat-社会ニュース  { background:rgba(100,116,139,0.18); color:#94a3b8; border:1px solid rgba(100,116,139,0.35); }

  /* ─── ランキングリスト ─── */
  .ranking-list{display:flex;flex-direction:column;gap:2px;}

  .ranking-item{
    display:grid;
    grid-template-columns:56px 1fr auto;
    align-items:start;
    gap:16px;
    padding:16px 20px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:6px;
    cursor:pointer;
    transition:all 0.18s;
    animation:fadeIn 0.3s ease both;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .ranking-item:hover{ background:var(--bg3); border-color:rgba(201,168,76,0.25); transform:translateX(3px); }
  .ranking-item.expanded{ border-color:rgba(201,168,76,0.4); }
  /* .ranking-item.hidden は廃止（カテゴリ別再描画方式に変更） */

  .rank-num{
    font-family:'DM Serif Display',serif;
    font-size:44px;
    line-height:1;
    text-align:right;
    color:var(--text-muted);
    padding-top:4px;
  }
  .rank-num.r1{color:var(--rank1);}
  .rank-num.r2{color:var(--rank2);}
  .rank-num.r3{color:var(--rank3);}

  .rank-info{ min-width:0; }
  .rank-keyword{
    font-size:23px;
    font-weight:700;
    color:var(--text);
    margin-bottom:6px;
    word-break:break-word;
  }
  .rank-meta{ display:flex;gap:7px;align-items:center;flex-wrap:wrap; }

  .source-badge{
    font-size:10px;font-weight:700;
    padding:2px 8px;border-radius:2px;letter-spacing:0.06em;
  }
  .src-google  { background:rgba(66,133,244,0.12);color:#1a56c4;border:1px solid rgba(66,133,244,0.3); }
  .src-niconico{ background:rgba(235,87,87,0.12); color:#c02020;border:1px solid rgba(235,87,87,0.3); }
  .src-yahoo   { background:rgba(230,0,18,0.12);  color:#c00010;border:1px solid rgba(230,0,18,0.3); }

  .trend-arrow{ font-size:11px; color:var(--text-muted); }
  .up  { color:#3ecf8e; }
  .down{ color:#ff6b6b; }

  /* ── 本文（折りたたみ） ── */
  .detail-body{
    display:none;
    grid-column:1/-1;
    padding-top:12px;
    border-top:1px solid var(--border);
    margin-top:8px;
    background:#ffffff;
    padding:12px;
    border-radius:6px;
  }
  .ranking-item.expanded .detail-body{ display:block; }

  /* バッジ・メタ情報（展開後に表示） */
  .rank-meta{
    display:flex;gap:7px;align-items:center;flex-wrap:wrap;
    margin-bottom:14px;
  }

  /* アフィリエイトリンク */
  .affiliate-label{
    font-size:11px;color:var(--text-muted);
    letter-spacing:0.1em;margin-bottom:10px;
  }
  .affiliate-links{ display:flex;gap:10px;flex-wrap:wrap; }
  .aff-link{
    display:inline-flex;align-items:center;gap:7px;
    padding:8px 16px;border-radius:4px;
    font-size:12px;font-weight:700;
    text-decoration:none;transition:opacity 0.15s;letter-spacing:0.04em;
  }
  .aff-link:hover{opacity:0.8;}
  .aff-amazon { background:rgba(255,153,0,0.15);border:1px solid rgba(255,153,0,0.5);color:#c07000; }
  .aff-rakuten{ background:rgba(191,0,0,0.10);  border:1px solid rgba(191,0,0,0.4);  color:#bf0000; }

  .rank-right{
    display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-top:6px;
  }
  .chevron{
    color:var(--text-muted);font-size:11px;transition:transform 0.2s;
    display:flex;align-items:center;gap:4px;
  }
  .chevron::after{ content:"詳細"; font-size:10px; font-family:'Noto Sans JP',sans-serif; }
  .ranking-item.expanded .chevron{ transform:none; color:var(--gold); }
  .ranking-item.expanded .chevron::after{ content:"閉じる"; }
  .count-badge{ font-size:10px;color:var(--text-muted);white-space:nowrap; }

  /* 更新情報 */
  .update-info{
    margin-bottom:16px;font-size:12px;color:var(--text-muted);
    display:flex;align-items:center;gap:12px;
  }
  .source-tags{ display:flex;gap:6px; }

  /* 件数表示 */
  .result-count{
    font-size:11px;color:var(--text-muted);margin-bottom:12px;
  }
  .result-count strong{ color:var(--gold); }

  /* フッター */
  footer{
    border-top:1px solid var(--border);padding:24px;
    text-align:center;font-size:13px;color:var(--text-muted);line-height:2;
  }
  footer a{ color:var(--gold-lt);text-decoration:none; }

  /* ─── ニュースカード ─── */
  .news-list{
    display:flex;flex-direction:column;gap:8px;
    margin-bottom:14px;
  }
  .news-card{
    display:block;
    padding:10px 14px;
    background:#ffffff;
    border:1px solid var(--border);
    border-radius:5px;
    text-decoration:none;
    transition:border-color 0.15s;
  }
  .news-card:hover{ border-color:rgba(201,168,76,0.35); }
  .news-title{
    font-size:16px;font-weight:500;color:var(--text);
    margin-bottom:4px;line-height:1.5;
  }
  .news-snippet{
    font-size:14px;color:var(--text-muted);
    line-height:1.6;margin-bottom:5px;
    display:-webkit-box;-webkit-line-clamp:2;
    -webkit-box-orient:vertical;overflow:hidden;
  }
  .news-source{
    font-size:10px;color:var(--text-muted);
    letter-spacing:0.06em;font-weight:700;
  }
  .news-empty{
    font-size:12px;color:var(--text-muted);
    padding:8px 0;
  }

  /* ─── ページレイアウト（3カラム） ─── */
  .page-layout{
    display:grid;
    grid-template-columns:1fr 240px;
    gap:28px;
    max-width:1100px;
    margin:0 auto;
    padding:32px 16px 80px;
    align-items:start;
  }
  main{
    min-width:0;
    max-width:100%;
    padding:0;        /* page-layoutがpaddingを持つため0に */
  }

  /* ─── サイドバー（商品比較カード） ─── */
  .sidebar{
    position:sticky;
    top:80px;
  }
  .gadget-card{
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  .gadget-card-header{
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .gadget-card-label{
    font-size:10px;font-weight:700;
    letter-spacing:0.1em;color:var(--gold);
  }
  .gadget-pr{
    font-size:9px;color:var(--text-muted);
    border:1px solid var(--border);
    padding:1px 5px;border-radius:2px;
  }
  .gadget-body{ padding:14px; }
  .gadget-name{
    font-size:13px;font-weight:700;
    color:var(--text);margin-bottom:4px;
    line-height:1.4;
  }
  .gadget-desc{
    font-size:11px;color:var(--text-muted);
    line-height:1.5;margin-bottom:14px;
  }
  .gadget-compare{
    display:flex;flex-direction:column;gap:8px;
  }
  .gadget-btn{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;border-radius:6px;
    text-decoration:none;font-size:12px;font-weight:700;
    transition:opacity 0.15s, transform 0.15s;
    gap:6px;
  }
  .gadget-btn:hover{ opacity:0.85; transform:translateX(2px); }
  .gadget-btn-left{ display:flex;align-items:center;gap:7px; }
  .gadget-btn-arrow{ font-size:11px;opacity:0.7; }
  .gadget-btn.amazon{
    background:rgba(255,153,0,0.12);
    border:1px solid rgba(255,153,0,0.35);
    color:#ffb84d;
  }
  .gadget-btn.rakuten{
    background:rgba(191,0,0,0.12);
    border:1px solid rgba(191,0,0,0.35);
    color:#ff6b6b;
  }
  /* 商品リストアイテム */
  .gadget-list{
    display:flex;flex-direction:column;gap:12px;
    max-height:calc(100vh - 200px);
    overflow-y:auto;
    scrollbar-width:thin;
    scrollbar-color:var(--border) transparent;
  }
  .gadget-item{
    padding-bottom:12px;
    border-bottom:1px solid var(--border);
  }
  .gadget-item:last-child{ border-bottom:none;padding-bottom:0; }
  .gadget-item-inner{
    display:flex;gap:10px;align-items:flex-start;
    margin-bottom:8px;
  }
  .gadget-thumb{
    width:56px;height:56px;object-fit:contain;
    border-radius:4px;background:var(--bg3);
    flex-shrink:0;border:1px solid var(--border);
  }
  .gadget-thumb-empty{
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
  }
  .gadget-item-info{ flex:1;min-width:0; }
  .gadget-rank{
    font-size:10px;font-weight:700;
    color:var(--gold);letter-spacing:0.06em;
    margin-bottom:2px;
  }
  .gadget-price{
    font-size:12px;font-weight:700;
    color:#1a7a50;margin-top:3px;
  }

  .gadget-shuffle{
    margin-top:12px;padding-top:10px;
    border-top:1px solid var(--border);
    text-align:center;
  }
  .gadget-shuffle-btn{
    background:transparent;border:none;
    font-size:11px;color:var(--text-muted);
    cursor:pointer;font-family:'Noto Sans JP',sans-serif;
    transition:color 0.15s;
  }
  .gadget-shuffle-btn:hover{ color:var(--gold); }

  /* ─── モバイル用インラインアフィリエイトバナー ─── */
  .inline-aff-row{
    display:none;   /* PC では非表示 */
    gap:8px;
    margin:8px 0;
  }
  .inline-aff-link{
    flex:1;display:flex;flex-direction:row;align-items:center;gap:10px;
    padding:10px 12px;border-radius:8px;
    font-size:13px;font-weight:700;text-decoration:none;
    transition:opacity 0.15s;
  }
  .inline-aff-link:hover{opacity:0.8;}
  .inline-aff-link.aff-amazon { background:rgba(255,153,0,0.15);border:1px solid rgba(255,153,0,0.5);color:#c07000; }
  .inline-aff-link.aff-rakuten{ background:rgba(191,0,0,0.10);  border:1px solid rgba(191,0,0,0.4);  color:#bf0000; }
  .inline-aff-thumb{
    width:56px;height:56px;object-fit:contain;border-radius:4px;
    background:#fff;border:1px solid rgba(0,0,0,0.08);
    flex-shrink:0;
  }
  .inline-aff-thumb-empty{ font-size:28px;flex-shrink:0; }
  .inline-aff-label{ font-size:13px;font-weight:700; }
  .inline-aff-info{ display:flex;flex-direction:column;gap:2px; }

  /* ─── スマホ対応 ─── */
  @media (max-width: 768px) {
    .page-layout   { grid-template-columns: 1fr; padding: 16px 14px 60px; gap: 0; }
    .gadget-card   { display: none; }  /* スマホはインライン表示のみ */
    .sidebar       { display: none; }         /* サイドバーを非表示 */
    .inline-aff-row{ display: flex; }         /* インラインバナーを表示 */
    header         { padding: 0 16px; }
    .logo          { font-size: 18px; }
    .section-title { font-size: 22px; }
    .ranking-item  { grid-template-columns: 44px 1fr auto; gap: 10px; padding: 12px 14px; }
    .rank-num      { font-size: 24px; }
    .rank-keyword  { font-size: 14px; }
    .date-tabs     { gap: 6px; }
    .date-tab      { padding: 5px 10px; font-size: 11px; }
    .cat-btn       { padding: 4px 10px; font-size: 11px; }
  }
</style>
<!-- Vercel Analytics（管理者ダッシュボードのみで確認可能） -->
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<header>
  <div style="grid-column:1"></div>
  <div class="logo">
    トレンドランキング
  </div>
  <div class="refresh-badge" style="justify-self:end">
    <div class="refresh-dot"></div>
    <span id="next-update">次回更新: --:--後</span>
  </div>
</header>

<div class="page-layout">

  <!-- メインコンテンツ -->
  <main>


    <!-- 日付タブ（5日分） -->
    <div class="date-tabs" id="date-tabs"></div>

    <!-- カテゴリフィルター -->
    <div class="category-bar" id="category-bar"></div>

    <!-- 更新情報 -->
    <div class="update-info">
      <span id="update-time">取得中...</span>
      <div class="source-tags">
        <span class="source-badge src-google">Google</span>
        <span class="source-badge src-niconico">NicoNico</span>
        <span class="source-badge src-yahoo">Yahoo!</span>
      </div>
    </div>

    <!-- 件数 -->
    <div class="result-count" id="result-count"></div>

    <!-- ランキングリスト -->
    <div class="ranking-list" id="ranking-list"></div>
  </main>

  <!-- 右サイドバー：ガジェット比較カード -->
  <aside class="sidebar sidebar-right">
    <div class="gadget-card" id="gadget-card">
      <div class="gadget-card-header">
        <span class="gadget-card-label">🎁 おすすめガジェット</span>
        <span class="gadget-pr">PR</span>
      </div>
      <div class="gadget-body">
        <div class="gadget-list" id="gadget-list">読み込み中...</div>

      </div>
    </div>
  </aside>

</div>

<footer>
  <p>本サイトはAmazon.co.jpアソシエイト・プログラム及び楽天アフィリエイトの参加者です。</p>
  <p>掲載の商品リンクを経由してご購入いただいた場合、当サイトが報酬を受け取ることがあります。</p>
  <p style="margin-top:8px;"><a href="#">プライバシーポリシー</a> · <a href="#">お問い合わせ</a></p>
</footer>

<script>
// ================================================================
// 定数
// ================================================================
const ASSOCIATE_ID  = "topnews22-22";
const RAKUTEN_AFF   = "0ec9c427.aa5cd21c.0ec9c428.b5bedaac";

// ================================================================
// ガジェットリスト（ランダム表示）
// ================================================================
// ================================================================
// 楽天ランキングAPI（ガジェット・リアルタイム人気順）
// ================================================================
let gadgetItems = [];   // APIから取得した商品リスト

// 楽天ランキングAPIで「ガジェット・家電」カテゴリを取得
// JSONファイルからガジェットを読み込む（サーバー側で楽天API取得済み）
async function fetchRakutenRanking() {
  try {
    const today = new Date(Date.now() + 9*60*60*1000).toISOString().slice(0,10);
    const data  = await fetchData(today);
    if (data.gadgets && data.gadgets.length > 0) {
      gadgetItems = data.gadgets;
      renderGadget();
    } else {
      renderGadgetFallback();
    }
  } catch (err) {
    console.warn("ガジェットデータ取得失敗:", err.message);
    renderGadgetFallback();
  }
}

// サイドバーに商品を全件描画（スクロール表示）
function renderGadget() {
  const container = document.getElementById('gadget-list');
  if (!container) return;

  const items = gadgetItems;
  if (items.length === 0) return;

  container.innerHTML = '';
  items.forEach((g, i) => {
    const rank = i + 1;
    const el   = document.createElement('div');
    el.className = 'gadget-item';
    el.innerHTML = `
      <div class="gadget-item-inner">
        ${g.image
          ? `<img class="gadget-thumb" src="${g.image}" alt="${g.name}" loading="lazy">`
          : `<div class="gadget-thumb gadget-thumb-empty">📦</div>`
        }
        <div class="gadget-item-info">
          <div class="gadget-rank">${rank}位</div>
          <div class="gadget-name">${g.name}</div>

        <a class="gadget-btn amazon"  href="${g.amazonUrl}"  target="_blank" rel="noopener noreferrer">
          <span>📦 Amazon</span><span class="gadget-btn-arrow">→</span>

function shuffleGadget() { /* 全件表示のため不使用 */ }

// ================================================================
// カテゴリ定義
// ================================================================
const CATEGORIES = ["トレンド","テクノロジー","経済・投資","エンタメ","ライフスタイル","スポーツ","グルメ","社会・ニュース"];

// カテゴリ → CSSクラス変換（特殊文字を除去）
function catClass(cat) {
  return 'cat-' + cat.replace(/[・]/g, '');
}

// ================================================================
// 本番用 — GitHub Actions が生成した JSON を読み込む
// ================================================================
// 日付ごとに1回だけ取得してキャッシュする
const dataCache = {};
async function fetchData(dateStr) {
  if (dataCache[dateStr]) return dataCache[dateStr];
  const res = await fetch(`/data/${dateStr}.json`);
  if (!res.ok) throw new Error(`データなし (${res.status})`);
  const json = await res.json();
  dataCache[dateStr] = json;
  return json;
}

// ================================================================
// 状態
// ================================================================
function getLast5Days() {
  const days = [];
  const now = new Date();
  for (let i = 0; i < 5; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }
  return days;
}

const days = getLast5Days();
let currentDate = days[0];
let currentCat  = "トレンド";

// ================================================================
// 日付ラベル
// ================================================================
function formatDateLabel(str) {
  const d = new Date(str + "T00:00:00");
  const m = d.getMonth() + 1, day = d.getDate();
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  if (str === days[0]) return `今日 (${m}/${day})`;
  if (str === days[1]) return `昨日 (${m}/${day})`;
  return `${m}/${day}(${w})`;
}

// ================================================================
// 描画: 日付タブ
// ================================================================
function renderTabs() {
  const c = document.getElementById('date-tabs');
  c.innerHTML = '';
  days.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'date-tab' + (d === currentDate ? ' active' : '');
    btn.textContent = formatDateLabel(d);
    btn.onclick = () => { currentDate = d; renderTabs(); renderRanking(); };
    c.appendChild(btn);
  });
}

// ================================================================
// 描画: カテゴリボタン
// ================================================================
function renderCategoryBar() {
  const c = document.getElementById('category-bar');
  c.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCat ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.onclick = () => { currentCat = cat; renderCategoryBar(); renderRanking(); };
    c.appendChild(btn);
  });
}

// ================================================================
// フィルター適用（再描画なし・表示/非表示切り替え）
// ================================================================
function applyFilter() {
  const items = document.querySelectorAll('.ranking-item[data-category]');
  let visible = 0;
  items.forEach(el => {
    const match = (currentCat === "トレンド" || el.dataset.category === currentCat);
    el.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  updateCount(visible);
}

function updateCount(n) {
  const el = document.getElementById('result-count');
  if (currentCat === "トレンド") {
    el.innerHTML = `全 <strong>${n}</strong> 件`;
  } else {
    el.innerHTML = `「<strong>${currentCat}</strong>」 ${n} 件`;
  }
}

// ================================================================
// 描画: ランキング本体
// ================================================================
function rankClass(r) { return r===1?'r1':r===2?'r2':r===3?'r3':''; }
function trendClass(t) { return t.startsWith('↑')?'up':t.startsWith('↓')?'down':''; }
function srcClass(s)  { return s === 'google_news' ? 'src-google' : `src-${s}`; }
function srcLabel(s)  { return {google:'Google',niconico:'NicoNico',yahoo:'Yahoo!',google_news:'Google News'}[s]||s; }
function fmtVol(v)    { if (!v && v !== 0) return ''; if (typeof v === 'string') return v; return v>=10000?(v/10000).toFixed(0)+'万件':v.toLocaleString()+'件'; }

async function renderRanking() {
  const list = document.getElementById('ranking-list');
  list.innerHTML = '<div style="color:var(--text-muted);padding:24px;text-align:center">読み込み中...</div>';

  let data;
  try {
    data = await fetchData(currentDate);
  } catch (e) {
    list.innerHTML = '<div style="color:var(--text-muted);padding:24px;text-align:center">この日のデータはまだありません</div>';
    document.getElementById('update-time').textContent = 'データなし';
    updateCount(0);
    return;
  }

  document.getElementById('update-time').textContent = `最終更新: ${data.updated_at ? data.updated_at.slice(0,16).replace('T',' ') : data.updated || '不明'}`;

  // すべて → trends TOP10 / カテゴリ別 → categories[カテゴリ名]
  let items;
  if (currentCat === "トレンド") {
    items = (data.trends || []).slice(0, 25); // Google Trends RSSの上限が約25件
  } else {
    items = (data.categories && data.categories[currentCat]) || [];
  }
  if (items.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted);padding:24px;text-align:center">このカテゴリのデータはありません</div>';
    updateCount(0);
    return;
  }

  list.innerHTML = '';

  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'ranking-item';
    div.dataset.category = item.category;
    div.style.animationDelay = (idx * 0.04) + 's';

    div.innerHTML = `
      <div class="rank-num ${rankClass(item.rank)}">${item.rank}</div>
      <div class="rank-info">
        <div class="rank-keyword">${item.keyword}</div>
        <div class="detail-body">
          <div class="rank-meta">
            <span class="cat-badge ${catClass(item.category)}">${item.category}</span>
            <span class="source-badge ${srcClass(item.source)}">${srcLabel(item.source)}</span>
            ${item.trend ? `<span class="trend-arrow ${trendClass(item.trend)}">${item.trend}</span>` : ''}
            ${item.volume_approx ? `<span style="font-size:11px;color:var(--text-muted)">検索 ${fmtVol(item.volume_approx)}</span>` : ''}
          </div>
          <div class="affiliate-label" style="margin-bottom:8px">${item.type === "news" ? "▸ 記事を読む" : "▸ 関連ニュース"}</div>
          <div class="news-list">
            ${(item.news && item.news.length > 0)
              ? item.news.slice(0,3).map(n => `
                <a class="news-card" href="${n.url}" target="_blank" rel="noopener noreferrer">
                  <div class="news-title">${n.title}</div>
                  ${n.snippet ? `<div class="news-snippet">${n.snippet}</div>` : ''}
                  <div class="news-source">${n.source}</div>
                </a>`).join('')
              : '<div class="news-empty">ニュース記事はありません</div>'
            }
          </div>
        </div>
      </div>
      <div class="rank-right">
        <span class="chevron">▼</span>
      </div>
    `;

    div.addEventListener('click', () => div.classList.toggle('expanded'));
    list.appendChild(div);

    // モバイル用: 5件ごとにガジェット比較バナーを挿入
    if ((idx + 1) % 5 === 0 && idx + 1 < items.length) {
      const rndG = gadgetItems.length > 0
        ? gadgetItems[Math.floor(Math.random() * gadgetItems.length)]
        : GADGET_FALLBACK[Math.floor(Math.random() * GADGET_FALLBACK.length)];
      const row  = document.createElement('div');
      row.className = 'inline-aff-row';
      const thumbHtml = rndG.image
        ? `<img class="inline-aff-thumb" src="${rndG.image}" alt="${rndG.name}" loading="lazy">`
        : `<span class="inline-aff-thumb-empty">📦</span>`;
      row.innerHTML = `
        <a class="inline-aff-link aff-amazon"
           href="${rndG.amazonUrl || '#'}"
           target="_blank" rel="noopener noreferrer">
          ${thumbHtml}
          <div class="inline-aff-info">
            <span class="inline-aff-label">📦 Amazonで見る</span>
            ${rndG.price ? `<span style="font-size:12px;opacity:0.8">${rndG.price}</span>` : ''}
          </div>
        </a>
        <a class="inline-aff-link aff-rakuten"
           href="${rndG.rakutenUrl || '#'}"
           target="_blank" rel="noopener noreferrer">
          ${thumbHtml}
          <div class="inline-aff-info">
            <span class="inline-aff-label">🛍 楽天で見る</span>
            ${rndG.price ? `<span style="font-size:12px;opacity:0.8">${rndG.price}</span>` : ''}
          </div>
        </a>`;
      list.appendChild(row);
    }
  });

  updateCount(items.length);
}

// ================================================================
// カウントダウン
// ================================================================
function startCountdown() {
  function tick() {
    const now = new Date();
    const remain = 30 - (now.getMinutes() % 30);
    const sec = 59 - now.getSeconds();
    document.getElementById('next-update').textContent =
      `次回更新: ${String(remain-1).padStart(2,'0')}:${String(sec).padStart(2,'0')}後`;
  }
  tick(); setInterval(tick, 1000);
}

// ================================================================
// 初期化
// ================================================================
renderTabs();
renderCategoryBar();
renderRanking();
startCountdown();
fetchRakutenRanking();
</script>
